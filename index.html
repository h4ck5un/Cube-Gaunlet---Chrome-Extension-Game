  <style>
  /* ── fullscreen override ── */
  html { width:100%; height:100%; margin:0; padding:0; }
  body {
    width:  100vw !important;
    height: 100vh !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden !important;
    /* keep original background/color from CSS vars — do NOT override them */
  }
  #root {
    width:  800px !important;   /* keep natural game size; JS will scale it */
    height: 420px !important;
    overflow: hidden !important;
    transform-origin: top left !important;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
  }
  </style>

  (function () {
    var GW = 800, GH = 420;

      var root = document.getElementById('root');

      var s  = Math.min(window.innerWidth / GW, window.innerHeight / GH);
      var ox = (window.innerWidth  - GW * s) / 2;
      var oy = (window.innerHeight - GH * s) / 2;
      root.style.transform = 'translate(' + ox + 'px,' + oy + 'px) scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    document.addEventListener('DOMContentLoaded', function() {
      fit(); requestAnimationFrame(fit); setTimeout(fit, 300); setTimeout(fit, 800);
    });
  })();
